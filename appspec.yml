version: 0.0
os: linux
files:
  - source: backend/
    destination: /var/www/application/wanderlust/backend
  - source: frontend/
    destination: /var/www/application/wanderlust/frontend
  - source: scripts/
    destination: /var/www/application/wanderlust/scripts

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 300
      runas: root
  ApplicationStop:
    - location: scripts/application_stop.sh
      timeout: 300
      runas: root
