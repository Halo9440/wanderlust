version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Setting script permissions..."
      - chmod +x scripts/*.sh
      - npm install
      - cd backend && npm install && cd ..
      - cd frontend && npm install && cd ..

  build:
    commands:
      - cd frontend && npm run build && cd ..
      - echo "Build completed successfully!"
      - echo "Creating deployment package..."
      # Ensure backend uses CommonJS (remove type module)
      - cd backend && echo '{"name":"backend","version":"1.0.0","main":"server.js","scripts":{"start":"node server.js"}}' > package.json && cd ..
      # Copy frontend build to backend public directory
      - mkdir -p backend/public
      - cp -r frontend/build/* backend/public/ 2>/dev/null || echo "Frontend build not found"

artifacts:
  files:
    - '**/*'
