version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Setting up environment..."
      - chmod +x scripts/*.sh
      - npm install
      - cd backend && npm install && cd ..
      - cd frontend && npm install && cd ..

  build:
    commands:
      - echo "Building application..."
      - cd frontend && npm run build && cd ..
      - echo "Verifying scripts are present..."
      - ls -la scripts/
      - echo "Build completed at `date`"

artifacts:
  files:
    - '**/*'
  base-directory: .
  discard-paths: no
