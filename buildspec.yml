version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - chmod +x scripts/*.sh
      - npm install
      - cd backend && npm install && cd ..
      - cd frontend && npm install && cd ..

  build:
    commands:
      - echo "Building frontend..."
      - cd frontend && npm run build && cd ..
      - echo "Build completed!"

artifacts:
  files:
    - '**/*'
  base-directory: .
