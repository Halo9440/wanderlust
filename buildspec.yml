version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - cd backend && npm install
      - npm install
  build:
    commands:
      - echo Building frontend...
      - cd frontend && npm run build
      - echo Build completed successfully!

artifacts:
  files:
    - '**/*'
  base-directory: frontend/build
