version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Setting script permissions..."
      - chmod +x scripts/*.sh
      - npm install
      - cd backend && npm install && cd ..
      - cd frontend && npm install && cd ..

  build:
    commands:
      - cd frontend && npm run build && cd ..
      - echo "Build completed successfully!"
      - echo "Creating deployment package..."
      - mkdir -p deploy_package/var/www/application/wanderlust
      - mkdir -p deploy_package/scripts
      # Copy entire backend with all its contents
      - cp -r backend/* deploy_package/var/www/application/wanderlust/backend/
      # Copy frontend build files to backend public directory
      - cp -r frontend/build/* deploy_package/var/www/application/wanderlust/backend/public/ 2>/dev/null || echo "Frontend build not found, continuing..."
      # Copy deployment scripts
      - cp -r scripts/* deploy_package/scripts/
      - cp appspec.yml deploy_package/
      - echo "Deployment package created"

artifacts:
  files:
    - '**/*'
  base-directory: deploy_package
