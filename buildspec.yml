version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Setting script permissions..."
      - chmod +x scripts/*.sh
      - npm install
      - cd backend && npm install && cd ..
      - cd frontend && npm install && cd ..

  build:
    commands:
      - cd frontend && npm run build && cd ..
      - echo "Build completed successfully!"
      - echo "Preparing deployment package..."
      # Ensure frontend build is copied to backend public
      - mkdir -p backend/public
      - cp -r frontend/build/* backend/public/ 2>/dev/null || echo "Frontend build not found, continuing..."
      - echo "Deployment package ready"

artifacts:
  files:
    - '**/*'
